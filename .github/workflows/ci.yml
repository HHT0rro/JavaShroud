name: public-ci

on:
  push:
    paths:
      - '.github/workflows/ci.yml'
      - 'build.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradlew.bat'
      - 'core-engine/**'
      - 'desktop-app/**'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'build.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradlew.bat'
      - 'core-engine/**'
      - 'desktop-app/**'

jobs:
  core-engine:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build core-engine
        run: ./gradlew :core-engine:build
        shell: bash

  desktop-app:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable
      - name: Install frontend dependencies
        run: corepack yarn install --immutable
        working-directory: desktop-app/frontend
      - name: Build frontend
        run: corepack yarn build
        working-directory: desktop-app/frontend
      - name: Verify desktop app Go module
        run: go build ./...
        working-directory: desktop-app
